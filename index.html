<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모아보드 (MoaBoard)</title>

  <!--
    ============================================================================
    모아보드 (MoaBoard) — 개인용 자산관리 대시보드 (완성형 단일 파일)
    ----------------------------------------------------------------------------
    · 디자인: MoaBoard 프로토타입/Stitch 디자인 소스 반영
      (민트-틸 accent #68dbae, 대문자 오버라인+큰 제목, 인사이트 카드,
       도넛+중앙 Total, 계좌 아코디언, 목표 카드/상세 링, JetBrains Mono 숫자)
    · 기능: 화면 전환(SPA) / 대시보드·추이·목표·자산·설정 / 목표 우선순위·정렬
            / 계좌·자산·목표·월스냅샷 CRUD / JSON 백업·복원 / Mock 데이터.
    · 외부 의존성 0 · 외부 서버 통신 없음 · 오프라인 동작 · LocalStorage 영속.
    · 웹폰트를 정확히 쓰려면 아래 <link> 주석을 해제하세요(외부 요청 발생).
    ============================================================================
  -->
  <!-- Pretendard (온라인 시 로드, 실패/오프라인 시 시스템 폰트로 자동 폴백) -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <style id="design-system">
    :root {
      /* 표면 */
      --bg:#0E1116; --surface:#171C24; --surface-2:#1C232D; --surface-3:#232B36;
      --hairline:#262D38; --hairline-strong:#3d4943;
      /* 텍스트 */
      --text:#E8EBF0; --text-sub:#8A93A3;
      /* 브랜드 (민트-틸) */
      --accent:#68DBAE; --accent-dim:#26A37A; --accent-deep:#0E3A2A; --on-accent:#003827;
      --accent-soft:rgba(104,219,174,.14);
      /* 자산군 (디자인 반영: 주식=민트, 채권=블루, 금=앰버, 현금=그레이) */
      --asset-stock:#68DBAE; --asset-bond:#8FB8FF; --asset-gold:#EF9F27; --asset-cash:#888780;
      /* 증감 */
      --up:#2FB37A; --down:#E24B4A;
      /* 우선순위 */
      --prio-1:#68DBAE; --prio-2:#EF9F27; --prio-3:#888780;
      /* 형태 */
      --radius-lg:16px; --radius-card:12px; --radius-ctrl:10px; --gap:16px; --maxw:960px;
      /* 폰트: Pretendard 기본 (CDN 로드, 실패 시 시스템 폰트 폴백) */
      --font-ui:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",Roboto,sans-serif;
      /* 숫자도 Pretendard 사용(tabular-nums로 정렬 유지) — 별도 모노 폰트 없음 */
      --font-mono:var(--font-ui);
    }
    @media (prefers-reduced-motion: reduce) { * { animation:none!important; transition:none!important; } }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
      font-family:var(--font-ui); font-weight:400; line-height:1.5; -webkit-font-smoothing:antialiased; }
    .num { font-family:var(--font-mono); font-variant-numeric:tabular-nums; font-feature-settings:"tnum"; font-weight:600; }
    .sub { color:var(--text-sub); } .up { color:var(--up); } .down { color:var(--down); }
    .val-accent { color:var(--accent); }

    /* 상단 바 */
    #app-header {
      position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between;
      max-width:var(--maxw); margin:0 auto; padding:14px 20px;
      background:color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter:blur(10px);
      border-bottom:1px solid var(--hairline);
    }
    #app-header .brand { display:flex; align-items:center; gap:9px; font-size:19px; font-weight:700; letter-spacing:-.01em; }
    #app-header .brand .logo { width:26px; height:26px; border-radius:8px; border:2px solid var(--accent);
      display:grid; place-items:center; color:var(--accent); font-size:13px; }
    #app-header .brand .accent { color:var(--accent); }
    #app-shell { max-width:var(--maxw); margin:0 auto; padding:0 20px 108px; }

    /* 오버라인 + 큰 제목 */
    .overline { font-size:12px; font-weight:600; letter-spacing:.09em; text-transform:uppercase; color:var(--text-sub); }
    .page-title { font-size:32px; font-weight:700; letter-spacing:-.02em; margin:2px 0 0; line-height:1.15; }
    @media (max-width:400px){ .page-title { font-size:27px; } }

    /* 카드 */
    .card { background:var(--surface); border:1px solid var(--hairline); border-radius:var(--radius-card); padding:16px; }
    .card.lg { border-radius:var(--radius-lg); padding:18px; }
    .card-title { font-size:13px; font-weight:600; letter-spacing:.04em; color:var(--text-sub); }

    /* 버튼 */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 15px; border-radius:var(--radius-ctrl);
      border:1px solid var(--hairline); background:transparent; color:var(--text); font-size:14px; font-weight:500;
      cursor:pointer; font-family:inherit; transition:background .12s,border-color .12s,filter .12s; }
    .btn:hover { background:var(--surface-2); border-color:var(--hairline-strong); }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:var(--on-accent); font-weight:600; border-radius:999px; }
    .btn.primary:hover { filter:brightness(1.06); background:var(--accent); }
    .btn.danger { color:var(--down); border-color:color-mix(in srgb,var(--down) 45%,var(--hairline)); }
    .btn.danger:hover { background:color-mix(in srgb,var(--down) 12%,transparent); }
    .btn.block { width:100%; justify-content:center; padding:14px; font-size:15px; }
    .btn.sm { padding:7px 11px; font-size:13px; }
    .btn.ghost { border-color:transparent; }

    /* 입력 */
    .input, .select { width:100%; padding:11px 13px; border-radius:var(--radius-ctrl); background:var(--bg);
      color:var(--text); border:1px solid var(--hairline); font-size:14px; font-family:inherit; }
    .input:focus, .select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .field label { font-size:12px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; color:var(--text-sub); }

    /* 아이콘 배지 */
    .icon-badge { width:42px; height:42px; border-radius:12px; display:grid; place-items:center; flex:0 0 auto;
      background:var(--accent-soft); color:var(--accent); font-size:20px; }

    /* pill / tag */
    .pill { display:inline-flex; align-items:center; gap:7px; font-size:13px; color:var(--text); }
    .pill .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
    .dot.stock{background:var(--asset-stock);} .dot.bond{background:var(--asset-bond);}
    .dot.gold{background:var(--asset-gold);} .dot.cash{background:var(--asset-cash);}
    .cat-pill { display:inline-flex; align-items:center; padding:3px 9px; border-radius:7px;
      font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    .dday { padding:4px 11px; border-radius:999px; font-size:12px; font-weight:600; font-family:var(--font-mono);
      color:var(--accent); border:1px solid color-mix(in srgb,var(--accent) 40%,var(--hairline)); background:var(--accent-soft); white-space:nowrap; }
    .dday.over { color:var(--down); border-color:color-mix(in srgb,var(--down) 40%,var(--hairline)); background:color-mix(in srgb,var(--down) 12%,transparent); }
    .chip { display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:999px; font-size:13px; font-weight:600; font-family:var(--font-mono); }
    .chip.up { color:var(--up); background:color-mix(in srgb,var(--up) 15%,transparent); }
    .chip.down { color:var(--down); background:color-mix(in srgb,var(--down) 15%,transparent); }

    /* 우선순위 배지 */
    .prio-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px;
      font-size:11px; font-weight:600; border:1px solid transparent; }
    .prio-1 { color:var(--prio-1); border-color:color-mix(in srgb,var(--prio-1) 45%,var(--hairline)); background:color-mix(in srgb,var(--prio-1) 12%,transparent); }
    .prio-2 { color:var(--prio-2); border-color:color-mix(in srgb,var(--prio-2) 45%,var(--hairline)); background:color-mix(in srgb,var(--prio-2) 12%,transparent); }
    .prio-3 { color:var(--prio-3); border-color:color-mix(in srgb,var(--prio-3) 45%,var(--hairline)); background:color-mix(in srgb,var(--prio-3) 12%,transparent); }

    /* 진행률 바 */
    .progress { height:8px; border-radius:999px; background:var(--hairline); overflow:hidden; }
    .progress>span { display:block; height:100%; background:var(--accent); border-radius:999px; }

    /* 행 / 그리드 */
    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 0; border-bottom:1px solid var(--hairline); min-height:44px; }
    .row:last-child { border-bottom:0; }
    .grid { display:grid; gap:var(--gap); }
    .grid.cols-2 { grid-template-columns:1fr 1fr; }
    .grid.cols-3 { grid-template-columns:repeat(3,1fr); }
    @media (max-width:560px){ .grid.cols-2,.grid.cols-3 { grid-template-columns:1fr; } }

    /* 인사이트 카드 */
    .insight { display:flex; gap:13px; align-items:flex-start; }
    .insight .body { flex:1; }
    .insight .body .lbl { font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text-sub); margin-bottom:3px; }
    .insight .body .txt { font-size:14px; color:var(--text); }

    /* 화면 전환 */
    .view { padding-top:22px; display:none; }
    .view.is-active { display:block; }
    .view-head { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .back-link { display:inline-flex; align-items:center; gap:6px; background:none; border:0; color:var(--accent);
      font-size:15px; font-weight:600; cursor:pointer; padding:0; margin-bottom:12px; font-family:inherit; }

    /* 큰 숫자 */
    .hero-num { font-size:42px; font-weight:700; letter-spacing:-.02em; font-family:var(--font-mono); }
    @media (max-width:400px){ .hero-num { font-size:34px; } }
    .stat-num { font-size:23px; font-weight:700; font-family:var(--font-mono); }
    .huge-num { font-size:44px; font-weight:700; letter-spacing:-.02em; color:var(--accent); font-family:var(--font-mono); }

    /* 차트 */
    .donut { position:relative; border-radius:50%; flex:0 0 auto; }
    .donut::after { content:""; position:absolute; inset:26px; border-radius:50%; background:var(--surface); }
    .donut.on-bg::after { background:var(--bg); }
    .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1; text-align:center; }
    .line-chart { width:100%; height:auto; display:block; }
    .chart-point { cursor:pointer; }
    #chart-tooltip { position:fixed; z-index:60; pointer-events:none; background:var(--surface-3);
      border:1px solid var(--hairline-strong); border-radius:10px; padding:8px 11px; font-size:12px; display:none; box-shadow:0 8px 24px rgba(0,0,0,.5); }
    .ring { transform:rotate(-90deg); }
    .ring-track { fill:none; stroke:var(--surface-3); }
    .ring-val { fill:none; stroke:var(--accent); stroke-linecap:round; transition:stroke-dashoffset .6s ease; }

    /* 세그먼트 컨트롤 */
    .seg { display:inline-flex; gap:4px; background:var(--surface); border:1px solid var(--hairline); border-radius:999px; padding:4px; }
    .seg button { border:0; background:transparent; color:var(--text-sub); padding:8px 16px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
    .seg button.on { background:var(--accent); color:var(--on-accent); }

    /* 빈 상태 */
    .empty { text-align:center; padding:38px 16px; color:var(--text-sub); border:1px dashed var(--hairline-strong); border-radius:var(--radius-lg); }
    .empty .em-ic { font-size:34px; opacity:.5; }
    .empty h3 { color:var(--text); font-weight:600; margin:10px 0 6px; font-size:16px; }
    .empty p { margin:0 0 16px; font-size:14px; }

    /* 하단 탭 */
    #tab-nav { position:fixed; left:0; right:0; bottom:0; z-index:30; display:flex; justify-content:space-around;
      max-width:var(--maxw); margin:0 auto; padding:9px 4px calc(9px + env(safe-area-inset-bottom));
      background:color-mix(in srgb, var(--surface) 97%, transparent); backdrop-filter:blur(12px); border-top:1px solid var(--hairline); }
    #tab-nav a { flex:1; text-align:center; text-decoration:none; color:var(--text-sub); font-size:11px; font-weight:500;
      display:flex; flex-direction:column; align-items:center; gap:4px; padding:4px 0; cursor:pointer; }
    #tab-nav a .ico { font-size:19px; line-height:1; }
    #tab-nav a.is-current { color:var(--accent); }

    /* 모달 */
    #modal-layer { position:fixed; inset:0; z-index:50; display:none; align-items:flex-end; justify-content:center; }
    #modal-layer.open { display:flex; }
    #modal-backdrop { position:absolute; inset:0; background:color-mix(in srgb, var(--bg) 80%, transparent); }
    .modal { position:relative; width:100%; max-width:460px; background:var(--surface); border:1px solid var(--hairline-strong);
      border-radius:20px 20px 0 0; padding:22px; max-height:90vh; overflow:auto; animation:slideup .18s ease; }
    @keyframes slideup { from{ transform:translateY(18px); opacity:.5; } to{ transform:none; opacity:1; } }
    @media (min-width:560px){ #modal-layer{ align-items:center; } .modal{ border-radius:20px; } }
    .modal h3 { margin:0 0 18px; font-size:19px; font-weight:700; }
    .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; }

    /* 토스트 */
    #toast { position:fixed; left:50%; bottom:92px; transform:translateX(-50%); z-index:70;
      background:var(--surface-3); border:1px solid var(--hairline-strong); color:var(--text); padding:11px 18px;
      border-radius:999px; font-size:14px; font-weight:500; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(-4px); }

    .muted-note { font-size:12px; color:var(--text-sub); margin-top:10px; line-height:1.6; }
    .clickable { cursor:pointer; }
    .clickable:hover { background:var(--surface-2); }
    .divider { height:1px; background:var(--hairline); margin:14px 0; border:0; }
  </style>
</head>

<body>
  <header id="app-header">
    <div class="brand"><span class="logo">◧</span>모아<span class="accent">보드</span></div>
    <select id="month-picker" class="select" style="width:auto;" aria-label="조회 월 선택"></select>
  </header>

  <main id="app-shell">
    <!-- 1) 대시보드 -->
    <section id="view-dashboard" class="view is-active"><div id="body-dashboard"></div></section>
    <!-- 2) 자산 추이 -->
    <section id="view-trends" class="view"><div id="body-trends"></div></section>
    <!-- 3) 목표 관리 -->
    <section id="view-goals" class="view"><div id="body-goals"></div></section>
    <!-- 4) 목표 상세 -->
    <section id="view-goal-detail" class="view">
      <button class="back-link" data-action="nav" data-target="view-goals">← 목표 관리</button>
      <div id="body-goal-detail"></div>
    </section>
    <!-- 5) 자산 관리 -->
    <section id="view-assets" class="view"><div id="body-assets"></div></section>
    <!-- 6) 계좌 상세 -->
    <section id="view-account-detail" class="view">
      <button class="back-link" data-action="nav" data-target="view-assets">← 자산 관리</button>
      <div id="body-account-detail"></div>
    </section>
    <!-- 7) 월 잔액 입력 -->
    <section id="view-entry" class="view">
      <button class="back-link" data-action="nav" data-target="view-assets">← 자산 관리</button>
      <div id="body-entry"></div>
    </section>
    <!-- 8) 설정·데이터 -->
    <section id="view-settings" class="view"><div id="body-settings"></div></section>
  </main>

  <!-- 하단 탭 (리밸런싱 제외: 5개) -->
  <nav id="tab-nav" aria-label="주요 화면 이동">
    <a data-action="nav" data-target="view-dashboard"><span class="ico">▦</span>대시보드</a>
    <a data-action="nav" data-target="view-trends"><span class="ico">📈</span>추이</a>
    <a data-action="nav" data-target="view-goals"><span class="ico">🎯</span>목표</a>
    <a data-action="nav" data-target="view-assets"><span class="ico">🏛️</span>자산</a>
    <a data-action="nav" data-target="view-settings"><span class="ico">⚙️</span>설정</a>
  </nav>

  <div id="modal-layer" aria-hidden="true">
    <div id="modal-backdrop" data-action="close-modal"></div>
    <div class="modal" id="modal-box" role="dialog" aria-modal="true"></div>
  </div>
  <div id="chart-tooltip"></div>
  <div id="toast" role="status" aria-live="polite"></div>
  <input type="file" id="import-file" accept="application/json,.json" style="display:none" />

  <script id="app">
  "use strict";
  (function () {
    /* ===================== 상수 / 설정 ===================== */
    var STORAGE_KEY = "moaboard-v2";
    var CATS = {
      stock: { label:"주식", en:"STOCK", color:"#68DBAE", cls:"stock" },
      bond:  { label:"채권", en:"BOND",  color:"#8FB8FF", cls:"bond" },
      gold:  { label:"금",   en:"GOLD",  color:"#EF9F27", cls:"gold" },
      cash:  { label:"현금", en:"CASH",  color:"#888780", cls:"cash" }
    };
    var CAT_ORDER = ["stock", "bond", "gold", "cash"];
    var TYPE_MAP = {
      "국내주식":"stock","해외주식":"stock","국내ETF":"stock","해외ETF":"stock",
      "채권":"bond","채권ETF":"bond",
      "금":"gold","금현물":"gold",
      "CMA":"cash","예금":"cash","적금":"cash","현금":"cash","예수금":"cash","연금":"cash"
    };
    var ASSET_TYPES = Object.keys(TYPE_MAP);
    var PRIOS = { 1:{label:"1순위 · 높음",cls:"prio-1"}, 2:{label:"2순위 · 중간",cls:"prio-2"}, 3:{label:"3순위 · 낮음",cls:"prio-3"} };
    var GOAL_ICONS = ["🏠","💍","🛟","✈️","🚗","🎓","👶","💰"];

    var state = null;
    var trendsRange = 12;

    /* ===================== 유틸 ===================== */
    function uid(p) { return (p || "id") + "-" + Math.random().toString(36).slice(2, 9); }
    function $(sel, root) { return (root || document).querySelector(sel); }
    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]; }); }

    function fmtWon(n) { return Math.round(n).toLocaleString("ko-KR") + "원"; }
    function fmtMan(n) {
      n = Math.round(n); var neg = n < 0; n = Math.abs(n);
      var eok = Math.floor(n / 1e8), man = Math.floor((n % 1e8) / 1e4), parts = [];
      if (eok) parts.push(eok.toLocaleString() + "억");
      if (man) parts.push(man.toLocaleString() + "만");
      var body = parts.length ? parts.join(" ") + "원" : (n.toLocaleString() + "원");
      return (neg ? "-" : "") + body;
    }
    function signedMan(d) { return (d >= 0 ? "+" : "") + fmtMan(d); }
    function pct(part, whole) { return whole > 0 ? (part / whole * 100) : 0; }
    function fmtPct(v) { return v.toFixed(1) + "%"; }
    function parseNum(str) { var d = String(str).replace(/[^\d]/g, ""); return d ? parseInt(d, 10) : 0; }

    function monthLabel(m) { var p = m.split("-"); return p[0] + "년 " + parseInt(p[1], 10) + "월"; }
    function monthsBetween(from, to) {
      var a = from.split("-"), b = to.split("-");
      return (parseInt(b[0]) - parseInt(a[0])) * 12 + (parseInt(b[1]) - parseInt(a[1]));
    }
    function daysTo(month) {
      var t = new Date(month + "-01T00:00:00"); t = new Date(t.getFullYear(), t.getMonth() + 1, 0);
      return Math.ceil((t - new Date()) / 86400000);
    }
    function ddayText(month) { var d = daysTo(month); return d > 0 ? "D-" + d.toLocaleString() : (d === 0 ? "D-DAY" : "기한 지남"); }

    /* ===================== 계산 ===================== */
    function grandTotal() { var t = 0; state.accounts.forEach(function (a) { a.assets.forEach(function (x) { t += x.amount; }); }); return t; }
    function accountTotal(a) { var t = 0; a.assets.forEach(function (x) { t += x.amount; }); return t; }
    function categoryTotals() {
      var m = { stock:0, bond:0, gold:0, cash:0 };
      state.accounts.forEach(function (a) { a.assets.forEach(function (x) { m[x.category] = (m[x.category] || 0) + x.amount; }); });
      return m;
    }
    function accountDominantCat(a) {
      var m = { stock:0, bond:0, gold:0, cash:0 };
      a.assets.forEach(function (x) { m[x.category] += x.amount; });
      var best = "cash", bv = -1; CAT_ORDER.forEach(function (k) { if (m[k] > bv) { bv = m[k]; best = k; } });
      return best;
    }
    function series() {
      var arr = state.snapshots.slice().sort(function (a, b) { return a.month < b.month ? -1 : 1; });
      var cur = state.currentMonth, gt = grandTotal(), found = false;
      arr = arr.map(function (s) { if (s.month === cur) { found = true; return { month: cur, total: gt }; } return s; });
      if (!found) arr.push({ month: cur, total: gt });
      arr.sort(function (a, b) { return a.month < b.month ? -1 : 1; });
      return arr;
    }
    function totalForMonth(m) {
      if (m === state.currentMonth) return grandTotal();
      var s = state.snapshots.filter(function (x) { return x.month === m; })[0];
      return s ? s.total : grandTotal();
    }
    function prevMonthOf(m) { var s = series(), idx = -1; for (var i = 0; i < s.length; i++) if (s[i].month === m) idx = i; return idx > 0 ? s[idx - 1] : null; }
    function goalProgress(g) { return Math.min(1, pct(grandTotal(), g.targetAmount) / 100); }
    function goalShortfall(g) { return Math.max(0, g.targetAmount - grandTotal()); }
    function goalMonthlyNeed(g) { var m = monthsBetween(state.currentMonth, g.targetDate); return m <= 0 ? null : goalShortfall(g) / m; }

    /* ===================== 차트 ===================== */
    function donutHTML(totalsMap, size, onBg, centerLabel) {
      var total = CAT_ORDER.reduce(function (s, k) { return s + (totalsMap[k] || 0); }, 0);
      var style = "width:" + size + "px;height:" + size + "px;";
      if (total <= 0) return '<div class="donut ' + (onBg?"on-bg":"") + '" style="' + style + 'background:var(--hairline);"><div class="donut-center sub" style="font-size:12px;">데이터 없음</div></div>';
      var acc = 0, stops = [];
      CAT_ORDER.forEach(function (k) {
        var v = totalsMap[k] || 0; if (v <= 0) return;
        var start = acc / total * 100; acc += v; var end = acc / total * 100;
        stops.push(CATS[k].color + " " + start.toFixed(2) + "% " + end.toFixed(2) + "%");
      });
      return '<div class="donut ' + (onBg?"on-bg":"") + '" style="' + style + 'background:conic-gradient(' + stops.join(",") + ');">' +
        '<div class="donut-center"><div class="num" style="font-size:' + (size>150?22:15) + 'px;font-weight:700;">' + (centerLabel || fmtMan(total)) + '</div>' +
        (size>150?'<div class="sub" style="font-size:11px;letter-spacing:.1em;">TOTAL</div>':'') + '</div></div>';
    }
    function legendHTML(totalsMap) {
      var total = CAT_ORDER.reduce(function (s, k) { return s + (totalsMap[k] || 0); }, 0);
      return '<ul style="list-style:none;padding:0;margin:0;display:grid;gap:14px;">' +
        CAT_ORDER.map(function (k) {
          var v = totalsMap[k] || 0;
          return '<li style="display:flex;align-items:center;gap:10px;"><span class="pill"><span class="dot ' + CATS[k].cls + '"></span> ' + CATS[k].label + '</span>' +
            '<span class="num sub" style="margin-left:auto;">' + fmtPct(pct(v, total)) + '</span></li>';
        }).join("") + '</ul>';
    }
    function lineChartHTML(data) {
      if (data.length < 2) return "";
      var W = 320, H = 150, padX = 6, padY = 16;
      var vals = data.map(function (d) { return d.total; });
      var min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
      if (min === max) { min = min * 0.98; max = max * 1.02 || 1; }
      var iw = W - padX * 2, ih = H - padY * 2;
      function X(i) { return padX + iw * (i / (data.length - 1)); }
      function Y(v) { return padY + ih * (1 - (v - min) / (max - min)); }
      var pts = data.map(function (d, i) { return X(i).toFixed(1) + "," + Y(d.total).toFixed(1); });
      var area = "M" + X(0).toFixed(1) + "," + (H - padY) + " L" + pts.join(" L") + " L" + X(data.length - 1).toFixed(1) + "," + (H - padY) + " Z";
      var circles = data.map(function (d, i) {
        return '<circle class="chart-point" cx="' + X(i).toFixed(1) + '" cy="' + Y(d.total).toFixed(1) + '" r="10" fill="transparent" data-month="' + d.month + '" data-total="' + d.total + '"></circle>' +
          '<circle cx="' + X(i).toFixed(1) + '" cy="' + Y(d.total).toFixed(1) + '" r="2.5" fill="var(--accent)"></circle>';
      }).join("");
      return '<svg class="line-chart" viewBox="0 0 ' + W + " " + H + '" role="img" aria-label="월별 총자산 추이">' +
        '<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity="0.22"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>' +
        '<path d="' + area + '" fill="url(#lg)"/>' +
        '<polyline points="' + pts.join(" ") + '" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
        circles + '</svg>';
    }
    function ringHTML(ratio, top, mid, bottom) {
      var r = 76, c = 2 * Math.PI * r, off = c * (1 - ratio);
      return '<svg viewBox="0 0 180 180" width="200" height="200" role="img" aria-label="달성률 ' + Math.round(ratio*100) + '%">' +
        '<circle class="ring-track" cx="90" cy="90" r="' + r + '" stroke-width="16"/>' +
        '<circle class="ring-val ring" cx="90" cy="90" r="' + r + '" stroke-width="16" stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + off.toFixed(1) + '"/>' +
        '<text x="90" y="80" text-anchor="middle" fill="var(--text-sub)" font-size="13">' + esc(top) + '</text>' +
        '<text x="90" y="102" text-anchor="middle" fill="var(--accent)" font-size="26" font-weight="700" font-family="var(--font-mono)">' + esc(mid) + '</text>' +

    }

      if (!state.goals.length) return "";
      var avgP = state.goals.reduce(function (s, g){ return s + goalProgress(g); }, 0) / state.goals.length * 100;

    /* ===================== 라우터 ===================== */
    var TAB_OF = {
      "view-dashboard":"view-dashboard","view-trends":"view-trends","view-goals":"view-goals","view-goal-detail":"view-goals",
      "view-assets":"view-assets","view-account-detail":"view-assets","view-entry":"view-assets","view-settings":"view-settings"
    };

      "view-dashboard":renderDashboard,"view-trends":renderTrends,"view-goals":renderGoals,"view-goal-detail":renderGoalDetail,
      "view-assets":renderAssets,"view-account-detail":renderAccountDetail,"view-entry":renderEntry,"view-settings":renderSettings
    };
    function navigate(viewId) {
      if (!TAB_OF[viewId]) viewId = "view-dashboard";
      if (RENDER_OF[viewId]) RENDER_OF[viewId]();
      document.querySelectorAll(".view").forEach(function (v){ v.classList.toggle("is-active", v.id === viewId); });
      var tab = TAB_OF[viewId];
      document.querySelectorAll("#tab-nav a").forEach(function (a){ a.classList.toggle("is-current", a.getAttribute("data-target") === tab); });
      window.scrollTo(0, 0);
    }

    /* ===================== 토스트 ===================== */
    var toastTimer = null;

    /* ===================== 이벤트 위임 ===================== */
    document.addEventListener("click", function (e) {
      var el = e.target.closest("[data-action]"); if (!el) return;
      var action = el.getAttribute("data-action");
      switch (action) {
        case "nav": navigate(el.getAttribute("data-target")); break;
        case "nav-goal": state.currentGoalId = el.getAttribute("data-id"); navigate("view-goal-detail"); break;
        case "nav-account": state.currentAccountId = el.getAttribute("data-id"); navigate("view-account-detail"); break;
        case "close-modal": closeModal(); break;
        case "add-goal": goalModal(null); break;
        case "edit-goal": goalModal(findGoal(el.getAttribute("data-id"))); break;
        case "delete-goal": deleteGoal(el.getAttribute("data-id")); break;
        case "add-account": accountModal(null); break;
        case "edit-account": accountModal(findAccount(el.getAttribute("data-id"))); break;
        case "delete-account": deleteAccount(el.getAttribute("data-id")); break;
        case "add-asset": assetModal(el.getAttribute("data-account"), null); break;
        case "edit-asset": assetModal(el.getAttribute("data-account"), findAsset(el.getAttribute("data-account"), el.getAttribute("data-id"))); break;
        case "delete-asset": deleteAsset(el.getAttribute("data-account"), el.getAttribute("data-id")); break;
        case "sort-goals": state.goalSort = el.getAttribute("data-sort"); save(); renderGoals(); break;
        case "trends-range":
          var r = el.getAttribute("data-range"); trendsRange = (r==="all"?"all":parseInt(r,10)); renderTrends(); break;
        case "same-prev":
          var inp = document.querySelector('.entry-input[data-id="' + el.getAttribute("data-id") + '"]');
          if (inp) { inp.value = Number(inp.getAttribute("data-prev")).toLocaleString(); recalcEntrySum(); } break;
        case "save-entry": saveEntry(); break;
        case "export": exportData(); break;
        case "import": $("#import-file").click(); break;
        case "reset": resetData(); break;
      }
    });
    document.addEventListener("change", function (e) {
      if (e.target.id === "asset-type") { var cat = TYPE_MAP[e.target.value], sel = $("#asset-cat"); if (cat && sel) sel.value = cat; }
      if (e.target.id === "month-picker") { state.currentMonth = e.target.value; save(); navigate("view-dashboard"); }
    });
    document.addEventListener("input", function (e) {
      if (e.target.hasAttribute && e.target.hasAttribute("data-comma")) { var raw = e.target.value.replace(/[^\d]/g,""); e.target.value = raw?Number(raw).toLocaleString():""; }
      if (e.target.classList && e.target.classList.contains("entry-input")) recalcEntrySum();
    });
    document.addEventListener("submit", function (e) {
      e.preventDefault();
      if (e.target.id === "goal-form") submitGoal(e.target);
      else if (e.target.id === "account-form") submitAccount(e.target);
      else if (e.target.id === "asset-form") submitAsset(e.target);
    });
    document.addEventListener("mouseover", function (e) {
      var p = e.target.closest && e.target.closest(".chart-point"); if (!p) return;
      var month = p.getAttribute("data-month"), total = parseInt(p.getAttribute("data-total"),10);
      var prev = prevMonthOf(month), d = prev ? total-prev.total : 0, tt = $("#chart-tooltip");
      tt.innerHTML = '<div class="num" style="font-weight:600;">' + monthLabel(month) + '</div><div class="num">' + fmtMan(total) + '</div>' +
        (prev ? '<div class="num ' + (d>=0?"up":"down") + '">' + signedMan(d) + '</div>' : "");
      tt.style.display = "block";
    });
    document.addEventListener("mousemove", function (e) {
      var tt = $("#chart-tooltip"); if (tt.style.display !== "block") return;
      tt.style.left = Math.min(window.innerWidth-150, e.clientX+12) + "px"; tt.style.top = (e.clientY-64) + "px";
    });
    document.addEventListener("mouseout", function (e) { if (e.target.closest && e.target.closest(".chart-point")) $("#chart-tooltip").style.display = "none"; });
    document.addEventListener("keydown", function (e) { if (e.key === "Escape") closeModal(); });

    $("#import-file").addEventListener("change", function (e) {
      var file = e.target.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function (ev) {
        try {
          var d = JSON.parse(ev.target.result);
          if (!d.accounts || !d.goals || !Array.isArray(d.accounts)) throw new Error("형식 오류");
          if (!confirm("현재 데이터를 불러온 파일로 덮어씁니다. 계속할까요?")) return;
          state = normalize(d); save(); refreshMonthPicker(); navigate("view-dashboard"); toast("데이터를 불러왔습니다");
        } catch (err) { alert("파일 형식을 확인해 주세요. 모아보드에서 내보낸 .json만 불러올 수 있어요."); }
      };
      reader.readAsText(file); e.target.value = "";
    });

    /* ===================== 조회 헬퍼 ===================== */
    function findGoal(id) { return state.goals.filter(function (g){ return g.id === id; })[0]; }
    function findAccount(id) { return state.accounts.filter(function (a){ return a.id === id; })[0]; }
    function findAsset(accId, id) { var a = findAccount(accId); return a ? a.assets.filter(function (x){ return x.id === id; })[0] : null; }

    /* ===================== CRUD: 목표 ===================== */
    function submitGoal(form) {
      var id = form.getAttribute("data-id");
      var name = form.elements["name"].value.trim(), amount = parseNum(form.elements["amount"].value);
      var date = form.elements["date"].value, priority = parseInt(form.elements["priority"].value,10), icon = form.elements["icon"].value;
      if (!name || amount <= 0 || !date) { alert("목표명·금액·시점을 모두 입력해 주세요."); return; }
      if (id) { var g = findGoal(id); g.name=name; g.targetAmount=amount; g.targetDate=date; g.priority=priority; g.icon=icon; }
      else { state.goals.push({ id:uid("goal"), name:name, targetAmount:amount, targetDate:date, priority:priority, icon:icon }); }
      save(); closeModal();
      if (id && state.currentGoalId === id && $("#view-goal-detail").classList.contains("is-active")) renderGoalDetail(); else navigate("view-goals");
      toast(id ? "목표를 수정했습니다" : "목표를 추가했습니다");
    }
    function deleteGoal(id) {
      var g = findGoal(id); if (!g) return;
      if (!confirm('"' + g.name + '" 목표를 삭제할까요?')) return;
      state.goals = state.goals.filter(function (x){ return x.id !== id; });
      save(); navigate("view-goals"); toast("목표를 삭제했습니다");
    }

    /* ===================== CRUD: 계좌 ===================== */
    function submitAccount(form) {
      var id = form.getAttribute("data-id"), name = form.elements["name"].value.trim();
      var bank = form.elements["bank"].value.trim(), rate = form.elements["rate"].value.trim();
      if (!name) { alert("계좌명을 입력해 주세요."); return; }
      if (id) { var a = findAccount(id); a.name=name; a.bank=bank; a.rate=rate; }
      else { state.accounts.push({ id:uid("acc"), name:name, bank:bank, rate:rate, assets:[] }); }
      save(); closeModal();
      if ($("#view-account-detail").classList.contains("is-active")) renderAccountDetail(); else renderAssets();
      toast(id ? "계좌를 수정했습니다" : "계좌를 추가했습니다");
    }
    function deleteAccount(id) {
      var a = findAccount(id); if (!a) return;
      if (!confirm('"' + a.name + '" 계좌와 포함된 자산을 모두 삭제할까요?')) return;
      state.accounts = state.accounts.filter(function (x){ return x.id !== id; });
      save(); navigate("view-assets"); toast("계좌를 삭제했습니다");
    }

    /* ===================== CRUD: 자산 ===================== */
    function submitAsset(form) {
      var accId = form.getAttribute("data-account"), id = form.getAttribute("data-id"), a = findAccount(accId); if (!a) return;
      var name = form.elements["name"].value.trim(), type = form.elements["type"].value, category = form.elements["category"].value, amount = parseNum(form.elements["amount"].value);
      if (!name || amount < 0) { alert("자산명과 금액을 확인해 주세요."); return; }
      if (id) { var x = findAsset(accId, id); x.name=name; x.type=type; x.category=category; x.amount=amount; }
      else { a.assets.push({ id:uid("as"), name:name, type:type, category:category, amount:amount }); }
      save(); closeModal();
      if ($("#view-account-detail").classList.contains("is-active")) renderAccountDetail(); else renderAssets();
      toast(id ? "자산을 수정했습니다" : "자산을 추가했습니다");
    }
    function deleteAsset(accId, id) {
      var x = findAsset(accId, id); if (!x) return;
      if (!confirm('"' + x.name + '" 자산을 삭제할까요?')) return;
      var a = findAccount(accId); a.assets = a.assets.filter(function (y){ return y.id !== id; });
      save();
      if ($("#view-account-detail").classList.contains("is-active")) renderAccountDetail(); else renderAssets();
      toast("자산을 삭제했습니다");
    }

    /* ===================== 월 스냅샷 저장 ===================== */
    function saveEntry() {
      document.querySelectorAll(".entry-input").forEach(function (inp) {
        var id = inp.getAttribute("data-id"), val = parseNum(inp.value);
        state.accounts.forEach(function (a){ a.assets.forEach(function (x){ if (x.id === id) x.amount = val; }); });
      });
      var cm = state.currentMonth, total = grandTotal();
      var ex = state.snapshots.filter(function (s){ return s.month === cm; })[0];
      if (ex) ex.total = total; else state.snapshots.push({ month:cm, total:total });
      save(); refreshMonthPicker(); navigate("view-dashboard"); toast(monthLabel(cm) + " 잔액 저장됨");
    }

    /* ===================== 백업 / 복원 / 초기화 ===================== */
    function exportData() {
      var blob = new Blob([JSON.stringify(state, null, 2)], { type:"application/json" });
      var url = URL.createObjectURL(blob), a = document.createElement("a");
      a.href = url; a.download = "moaboard-backup-" + state.currentMonth + ".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      toast("데이터를 내보냈습니다");
    }
    function resetData() {
      if (!confirm("모든 데이터를 삭제하고 예시 데이터로 초기화할까요? 되돌릴 수 없습니다.")) return;
      state = seed(); save(); refreshMonthPicker(); navigate("view-dashboard"); toast("예시 데이터로 초기화했습니다");
    }

    /* ===================== 월 선택 드롭다운 ===================== */
    function refreshMonthPicker() {
      var sel = $("#month-picker"), months = series().map(function (s){ return s.month; });
      sel.innerHTML = months.slice().reverse().map(function (m){ return '<option value="' + m + '"' + (m===state.currentMonth?" selected":"") + '>' + monthLabel(m) + '</option>'; }).join("");
    }

    /* ===================== 정규화(방어) ===================== */
    function normalize(d) {
      d.accounts = (d.accounts||[]).map(function (a) {
        return { id:a.id||uid("acc"), name:a.name||"계좌", bank:a.bank||"", rate:a.rate||"", assets:(a.assets||[]).map(function (x) {
          return { id:x.id||uid("as"), name:x.name||"자산", type:x.type||"현금", category:CATS[x.category]?x.category:"cash", amount:Number(x.amount)||0 };
        }) };
      });
      d.goals = (d.goals||[]).map(function (g) {
        return { id:g.id||uid("goal"), name:g.name||"목표", targetAmount:Number(g.targetAmount)||0, targetDate:g.targetDate||"2027-12",
          priority:[1,2,3].indexOf(Number(g.priority))>=0?Number(g.priority):2, icon:g.icon||"🎯" };
      });
      d.snapshots = (d.snapshots||[]).filter(function (s){ return s && s.month; }).map(function (s){ return { month:s.month, total:Number(s.total)||0 }; });
      d.currentMonth = d.currentMonth || "2026-07";
      return d;
    }

    /* ===================== 초기화 ===================== */
    function init() {
      var loaded = load();
      state = loaded ? normalize(loaded) : seed();
      save(); refreshMonthPicker(); navigate("view-dashboard");
    }
    init();
  })();
  </script>
</body>
</html>
